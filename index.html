<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogalerie Světa - ÁMOS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- FIXNÍ KONTEJNER PRO ÁMOS OBRAZOVKU 1080x1000 px -->
    <main class="app-container">
        
        <!-- HLAVNÍ STRÁNKA: GRID GRAFICKÝCH DLAŽDIC (3 VEDLE SEBE) -->
        <section id="home-view" class="view active">
            <div id="countries-grid" class="countries-grid">
                <!-- Dynamicky plněno z JS pomocí obrázků DE, ENG, USA -->
            </div>
        </section>

        <!-- DETAIL ZEMĚ -->
        <section id="detail-view" class="view">
            <!-- NOVÁ HLAVIČKA: Název a popisek vedle sebe pro úsporu místa -->
            <header class="detail-header">
                <button id="back-btn" class="btn-back">⬅ Zpět</button>
                <div class="header-text-block">
                    <h1 id="country-title">USA</h1>
                    <div class="main-info-card-inline">
                        <p id="main-country-desc">Popisek k zemi...</p>
                    </div>
                </div>
            </header>
            
            <div class="detail-content">
                <!-- HLAVNÍ ZOBRAZENÁ FOTOGRAFIE SE ŠIPKAMI -->
                <div class="main-photo-card">
                    <div class="main-photo-wrapper">
                        <button id="prev-photo-btn" class="nav-arrow-btn prev">◀</button>
                        <button id="next-photo-btn" class="nav-arrow-btn next">▶</button>
                        <img id="main-display-img" src="" alt="Zobrazená fotografie">
                    </div>
                    <div class="main-photo-caption-box">
                        <p id="main-display-caption">Popisek fotografie...</p>
                    </div>
                </div>

                <!-- HORIZONTÁLNÍ PÁS MINIATUR -->
                <div class="thumbnails-wrapper-row">
                    <div class="thumbnails-section-label">Fotografie v albu:</div>
                    <div id="thumbnails-container" class="thumbnails-container">
                        <!-- Miniatury -->
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
